<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForexTrack – Stone & Company Forex Fund</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background-color: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 28px 40px 24px;
      border-bottom: 2px solid #0f3460;
      text-align: center;
    }
    header .welcome   { color: #8892b0; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
    header h1         { font-size: 2.4rem; color: #00d4ff; margin-bottom: 4px; letter-spacing: 3px; font-weight: 800; }
    header .fund-name { color: #ccd6f6; font-size: 1rem; letter-spacing: 1px; margin-bottom: 2px; }
    header p          { color: #8892b0; font-size: 0.8rem; }

    main {
      flex: 1;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    footer {
      background: #1a1a2e;
      padding: 16px;
      text-align: center;
      color: #8892b0;
      font-size: 0.8rem;
      border-top: 1px solid #0f3460;
    }

    /* ── Summary cards ── */
    .summary-section {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: linear-gradient(145deg, #16213e, #1a1a2e);
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    .summary-card h3 {
      color: #8892b0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .summary-card .value { font-size: 1.5rem; font-weight: 700; color: #00d4ff; }

    /* ── Refresh row ── */
    .refresh-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .dashboard-title    { font-size: 1.4rem; color: #ccd6f6; margin-bottom: 4px; }
    .dashboard-subtitle { color: #8892b0; font-size: 0.85rem; }

    .refresh-btn {
      background: #0f3460;
      color: #00d4ff;
      border: 1px solid #00d4ff;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover   { background: #00d4ff; color: #0f0f23; }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Currency grid ── */
    .currency-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .currency-card {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .currency-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.1);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .pair-name  { font-size: 1.2rem; font-weight: 700; color: #ccd6f6; }
    .pair-flag  { font-size: 1.5rem; }
    .card-price { font-size: 1.8rem; font-weight: 700; color: #e0e0e0; margin-bottom: 12px; }
    .card-details { display: flex; justify-content: space-between; font-size: 0.85rem; }
    .card-row   { display: flex; justify-content: space-between; margin-top: 8px; }
    .change-positive { color: #00e676; font-weight: 600; }
    .change-negative { color: #ff5252; font-weight: 600; }
    .detail-label { color: #8892b0; }
    .detail-value { color: #ccd6f6; font-weight: 500; }

    /* ── Intake form (minimal, fits theme) ── */
    .intake-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .intake-label {
      display: block;
      color: #8892b0;
      font-size: 0.8rem;
      margin-bottom: 6px;
    }
    .intake-input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #0f0f23;
      color: #e0e0e0;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      header h1 { font-size: 1.5rem; }
      main { padding: 16px; }
      .currency-grid { grid-template-columns: 1fr; }
      .summary-section { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <p class="welcome">Welcome to</p>
  <h1>ForexTrack</h1>
  <p class="fund-name">Stone &amp; Company Forex Fund</p>
  <p>Live Investment Dashboard</p>
</header>

<main>
  <!-- Summary row -->
  <div class="summary-section">
    <div class="summary-card">
      <h3>Total Pairs</h3>
      <div class="value" id="total-pairs">8</div>
    </div>
    <div class="summary-card">
      <h3>Gainers</h3>
      <div class="value" id="gainers" style="color:#00e676">—</div>
    </div>
    <div class="summary-card">
      <h3>Losers</h3>
      <div class="value" id="losers" style="color:#ff5252">—</div>
    </div>
    <div class="summary-card">
      <h3>Last Updated</h3>
      <div class="value" id="last-updated" style="font-size:1rem">—</div>
    </div>
  </div>

  <!-- Header + refresh -->
  <div class="refresh-row">
    <div>
      <h2 class="dashboard-title">Currency Pairs</h2>
      <p class="dashboard-subtitle">Live market overview &bull; Updates every 30 seconds</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="refresh()">Refresh</button>
  </div>

  <!-- Cards -->
  <div class="currency-grid" id="currency-grid"></div>

  <!-- Investor Intake -->
  <section class="summary-card" style="text-align:left; margin-top: 18px;">
    <h3 style="margin-bottom:10px;">Investor Intake</h3>

    <form id="intake-form">
      <div class="intake-grid">
        <div>
          <label class="intake-label" for="leadName">Name</label>
          <input class="intake-input" id="leadName" required />
        </div>

        <div>
          <label class="intake-label" for="leadEmail">Email</label>
          <input class="intake-input" id="leadEmail" type="email" required />
        </div>

        <div>
          <label class="intake-label" for="leadBirthday">Birthday (optional)</label>
          <input class="intake-input" id="leadBirthday" type="date" />
        </div>

        <div>
          <label class="intake-label" for="leadStarting">Starting Investment (USD)</label>
          <input class="intake-input" id="leadStarting" type="number" min="0" step="0.01" />
        </div>

        <div>
          <label class="intake-label" for="leadAdditional">Additional Investment (USD)</label>
          <input class="intake-input" id="leadAdditional" type="number" min="0" step="0.01" />
        </div>
      </div>

      <div style="margin-top:12px; display:flex; gap:10px; align-items:center;">
        <button id="leadSubmitBtn" class="refresh-btn" type="submit">Submit</button>
        <button class="refresh-btn" type="button" onclick="document.getElementById('intake-form').reset()">Clear</button>
        <span id="leadMsg" style="margin-left:8px; color:#8892b0; font-size:0.9rem;"></span>
      </div>
    </form>
  </section>
</main>

<footer>
  <p id="footer-year"></p>
</footer>

<script>

    '\u00a9 ' + new Date().getFullYear() + ' ForexTrack \u2013 Stone & Company Forex Fund. All rights reserved.';

  ];

  const VARIATION = 0.002;
  let currentData = JSON.parse(JSON.stringify(SAMPLE_DATA));

  function addVariation(data) {
    return data.map(function(item) {
      var basePrice = parseFloat(item.price);
      var variation = (Math.random() - 0.5) * VARIATION * basePrice;
      var newPrice  = basePrice + variation;
      var changePct = (variation / basePrice) * 100;
      var decimals  = item.price.includes('.') ? item.price.split('.')[1].length : 2;
      return Object.assign({}, item, {
        price:         newPrice.toFixed(decimals),
        change:        (variation  >= 0 ? '+' : '') + variation.toFixed(decimals),
        changePercent: (changePct  >= 0 ? '+' : '') + changePct.toFixed(2) + '%',
      });
    });
  }

    var grid = document.getElementById('currency-grid');
    grid.innerHTML = data.map(function(p) {
      var positive = p.change.startsWith('+');
      return '<div class="currency-card">' +
        '<div class="card-header">
