<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForexPage – Investment Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background-color: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px 40px;
      border-bottom: 2px solid #0f3460;
      text-align: center;
    }
    header h1 { font-size: 2rem; color: #00d4ff; margin-bottom: 4px; letter-spacing: 2px; }
    header p  { color: #8892b0; font-size: 0.9rem; }

    main {
      flex: 1;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    footer {
      background: #1a1a2e;
      padding: 16px;
      text-align: center;
      color: #8892b0;
      font-size: 0.8rem;
      border-top: 1px solid #0f3460;
    }

    /* ── Summary cards ── */
    .summary-section {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: linear-gradient(145deg, #16213e, #1a1a2e);
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    .summary-card h3 {
      color: #8892b0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .summary-card .value { font-size: 1.5rem; font-weight: 700; color: #00d4ff; }

    /* ── Refresh row ── */
    .refresh-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .dashboard-title    { font-size: 1.4rem; color: #ccd6f6; margin-bottom: 4px; }
    .dashboard-subtitle { color: #8892b0; font-size: 0.85rem; }

    .refresh-btn {
      background: #0f3460;
      color: #00d4ff;
      border: 1px solid #00d4ff;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover   { background: #00d4ff; color: #0f0f23; }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Currency grid ── */
    .currency-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .currency-card {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .currency-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.1);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .pair-name  { font-size: 1.2rem; font-weight: 700; color: #ccd6f6; }
    .pair-flag  { font-size: 1.5rem; }
    .card-price { font-size: 1.8rem; font-weight: 700; color: #e0e0e0; margin-bottom: 12px; }
    .card-details { display: flex; justify-content: space-between; font-size: 0.85rem; }
    .card-row   { display: flex; justify-content: space-between; margin-top: 8px; }
    .change-positive { color: #00e676; font-weight: 600; }
    .change-negative { color: #ff5252; font-weight: 600; }
    .detail-label { color: #8892b0; }
    .detail-value { color: #ccd6f6; font-weight: 500; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      header h1 { font-size: 1.5rem; }
      main { padding: 16px; }
      .currency-grid { grid-template-columns: 1fr; }
      .summary-section { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>ForexPage</h1>
  <p>Forex Investment Dashboard</p>
</header>

<main>
  <!-- Summary row -->
  <div class="summary-section">
    <div class="summary-card">
      <h3>Total Pairs</h3>
      <div class="value" id="total-pairs">8</div>
    </div>
    <div class="summary-card">
      <h3>Gainers</h3>
      <div class="value" id="gainers" style="color:#00e676">—</div>
    </div>
    <div class="summary-card">
      <h3>Losers</h3>
      <div class="value" id="losers" style="color:#ff5252">—</div>
    </div>
    <div class="summary-card">
      <h3>Last Updated</h3>
      <div class="value" id="last-updated" style="font-size:1rem">—</div>
    </div>
  </div>

  <!-- Header + refresh -->
  <div class="refresh-row">
    <div>
      <h2 class="dashboard-title">Currency Pairs</h2>
      <p class="dashboard-subtitle">Live market overview &bull; Updates every 30 seconds</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="refresh()">Refresh</button>
  </div>

  <!-- Cards -->
  <div class="currency-grid" id="currency-grid"></div>
</main>

<footer>
  <p id="footer-year"></p>
</footer>

<script>
  document.getElementById('footer-year').textContent =
    '\u00a9 ' + new Date().getFullYear() + ' ForexPage. All rights reserved.';

  const SAMPLE_DATA = [
    { pair:'EUR/USD', price:'1.0872', change:'+0.0023', changePercent:'+0.21%', high:'1.0895', low:'1.0841', flag:'🇪🇺🇺🇸' },
    { pair:'GBP/USD', price:'1.2634', change:'-0.0018', changePercent:'-0.14%', high:'1.2670', low:'1.2610', flag:'🇬🇧🇺🇸' },
    { pair:'USD/JPY', price:'151.42', change:'+0.35',   changePercent:'+0.23%', high:'151.80', low:'150.95', flag:'🇺🇸🇯🇵' },
    { pair:'USD/CHF', price:'0.8821', change:'-0.0012', changePercent:'-0.14%', high:'0.8845', low:'0.8805', flag:'🇺🇸🇨🇭' },
    { pair:'AUD/USD', price:'0.6543', change:'+0.0031', changePercent:'+0.48%', high:'0.6560', low:'0.6510', flag:'🇦🇺🇺🇸' },
    { pair:'USD/CAD', price:'1.3642', change:'+0.0015', changePercent:'+0.11%', high:'1.3665', low:'1.3620', flag:'🇺🇸🇨🇦' },
    { pair:'NZD/USD', price:'0.6012', change:'-0.0008', changePercent:'-0.13%', high:'0.6035', low:'0.5998', flag:'🇳🇿🇺🇸' },
    { pair:'EUR/GBP', price:'0.8606', change:'+0.0014', changePercent:'+0.16%', high:'0.8625', low:'0.8590', flag:'🇪🇺🇬🇧' },
  ];

  const VARIATION = 0.002;
  let currentData = JSON.parse(JSON.stringify(SAMPLE_DATA));

  function addVariation(data) {
    return data.map(function(item) {
      var basePrice = parseFloat(item.price);
      var variation = (Math.random() - 0.5) * VARIATION * basePrice;
      var newPrice  = basePrice + variation;
      var changePct = (variation / basePrice) * 100;
      var decimals  = item.price.includes('.') ? item.price.split('.')[1].length : 2;
      return Object.assign({}, item, {
        price:         newPrice.toFixed(decimals),
        change:        (variation  >= 0 ? '+' : '') + variation.toFixed(decimals),
        changePercent: (changePct  >= 0 ? '+' : '') + changePct.toFixed(2) + '%',
      });
    });
  }

  function renderGrid(data) {
    var grid = document.getElementById('currency-grid');
    grid.innerHTML = data.map(function(p) {
      var positive = p.change.startsWith('+');
      return '<div class="currency-card">' +
        '<div class="card-header">' +
          '<span class="pair-name">' + p.pair + '</span>' +
          '<span class="pair-flag">'  + p.flag + '</span>' +
        '</div>' +
        '<div class="card-price">' + p.price + '</div>' +
        '<div class="card-details">' +
          '<span class="' + (positive ? 'change-positive' : 'change-negative') + '">' +
            p.change + ' (' + p.changePercent + ')' +
          '</span>' +
        '</div>' +
        '<div class="card-row">' +
          '<span><span class="detail-label">H: </span><span class="detail-value">' + p.high + '</span></span>' +
          '<span><span class="detail-label">L: </span><span class="detail-value">' + p.low  + '</span></span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function updateSummary(data) {
    var gainers = data.filter(function(p) { return p.change.startsWith('+'); }).length;
    document.getElementById('total-pairs').textContent  = data.length;
    document.getElementById('gainers').textContent      = gainers;
    document.getElementById('losers').textContent       = data.length - gainers;
    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
  }

  function refresh() {
    var btn = document.getElementById('refresh-btn');
    btn.disabled    = true;
    btn.textContent = 'Updating\u2026';
    currentData = addVariation(currentData);
    renderGrid(currentData);
    updateSummary(currentData);
    btn.disabled    = false;
    btn.textContent = 'Refresh';
  }

  // Initial render
  renderGrid(currentData);
  updateSummary(currentData);

  // Auto-refresh every 30 seconds
  setInterval(refresh, 30000);
</script>
</body>
</html>
